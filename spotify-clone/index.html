<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/03aa72c7be.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/style.css">
    <title>Spotify - GUILHERME</title>
</head>
<body> 

    <!-- COLUNA DA ESQUERDA TODO O CONTEÚDO DO CONTAINER  -->

    <div class ="container">

        <nav class="sidebar">
            <div class="nav-logo">
                <i class="fa-brands fa-spotify"></i>
            </div>
            <div class="nav-library">
                <i class="fa-solid fa-book"></i>
                <p>Sua Biblioteca +</p>
            </div>
            <div class="nav-playlist">
                <h5>Crie sua Primeira Playlist</h5>
                <p>É fácil vamos te ajudar</p>
                <button>Criar Playlist</button>
            </div>
            <div class="nav-podcast">
                <h5>Que tal seguir um podcast novo?</h5>
                <p>avisaremos você sobre novos episódios.</p>
                <button>Explore podcasts</button>
            </div>
            <div class="nav-footer">
                <a href="#">Legal</a>
                <a href="#">Segurança e Centro  de Privacidade</a>
                <a href="#">Política de privacidade</a>
                <a href="#">Cookies</a>
                <a href="#">Sobre anúncios</a>
                <a href="#">Acessibilidade</a>
                <a href="#">Cookies</a>
            </div>
            <button class="nav-lang-button">
                <i class="fa-solid fa-globe"></i>
                Português do Brasil
            </button>
         </nav>

    

                   <!---------------------------------------------------------------------------------------------------- -->
    



               <!---------------------------------- BARRA DE NAVEGAÇÃO CONTEÚDO AQUI  --------------------------------------->

                <main>

                     <header class="search-bar">
                        <i class="fa-brands fa-sistrix"></i>
                        <input placeholder="O que você quer ouvir?">
                     </header>

                     <section class="content">
                        <h2>Artista Populares</h2>
                        <div class="artists-grid"></div>

                        <!-- OS DADOS ESTÃO EM JS -->

                        <h2>Álbuns Populares</h2>
                        <div class="albums-grid"></div>

                        <!-- OS DADOS ESTÃO EM JS -->

                     </section>
             </main>

       </div> <!-- FIM DO CONTAINER AQUI -->















<script src="js/script.js"></script>


</body>
</html>
